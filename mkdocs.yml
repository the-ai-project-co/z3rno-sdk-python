site_name: Z3rno Python SDK
site_description: Python SDK for Z3rno — AI agent memory database.
site_url: https://docs.z3rno.dev/sdk/python
repo_url: https://github.com/the-ai-project-co/z3rno-sdk-python
repo_name: the-ai-project-co/z3rno-sdk-python

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            members_order: source
            docstring_style: google

nav:
  - Home: index.md
  - API Reference:
      - Client: client.md
      - Async Client: async_client.md
      - Models: models.md
      - Exceptions: exceptions.md

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.snippets
  - toc:
      permalink: true
